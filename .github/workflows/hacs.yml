name: HACS Action

on:
  push:
    branches:
      - main
  schedule:
    - cron: '25 23 * * *'

jobs:
  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    if: github.repository == 'punxaphil/custom-sonos-card' && github.ref == 'refs/heads/main'
    steps:
      - name: HACS Action
        uses: hacs/action@main
        with:
          category: plugin
